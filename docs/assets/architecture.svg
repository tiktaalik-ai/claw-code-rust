  <text x="140" y="278" fill="#15803D" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">Tool / Registry / Orchestrator</text>

  <rect x="312" y="222" width="216" height="76" rx="16" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
