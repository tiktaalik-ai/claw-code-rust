  <text x="420" y="170" fill="#3B82F6" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle">QueryLoop / Message / Store / Config</text>

  <!-- Line: core -> split -->
  <path d="M420 182V204" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <!-- Horizontal bar -->
  <path d="M140 204H700" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <!-- Drops to 3 boxes -->
  <path d="M140 204V222" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
