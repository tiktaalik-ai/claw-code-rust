  <text x="140" y="352" fill="#0C4A6E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">agent-provider</text>
  <text x="140" y="374" fill="#0369A1" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">Provider / Stream / Retry</text>

  <rect x="312" y="318" width="216" height="76" rx="16" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="420" y="352" fill="#92400E" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">agent-compact</text>
  <text x="420" y="374" fill="#B45309" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">Budget / TokenStrategy</text>

