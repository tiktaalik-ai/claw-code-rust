  <!-- Lines: bottom row -> tools-builtin -->
  <path d="M140 394V414" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M420 394V414" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M700 394V414" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <!-- Horizontal bar bottom -->
  <path d="M140 414H700" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <!-- Drop to builtin -->
  <path d="M420 414V428" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>

  <!-- Layer 5: tools-builtin -->
  <rect x="250" y="428" width="340" height="24" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="420" y="445" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">tools-builtin : Bash / File / Glob / Grep / Agent ...</text>
