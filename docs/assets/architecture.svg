<svg width="840" height="460" viewBox="0 0 840 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="840" height="460" rx="20" fill="#F8FAFC"/>

  <!-- Layer 1: claude-cli -->
  <rect x="250" y="28" width="340" height="56" rx="16" fill="#0F172A"/>
  <text x="420" y="63" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle">claude-cli</text>

  <!-- Line: cli -> core -->
  <path d="M420 84V112" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>

  <!-- Layer 2: agent-core -->
  <rect x="170" y="112" width="500" height="70" rx="16" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
