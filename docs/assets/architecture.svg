  <path d="M140 298V318" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M420 298V318" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M700 298V318" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>

